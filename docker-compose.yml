services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pia
      POSTGRES_USER: pia
      POSTGRES_PASSWORD: pia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pia -d pia"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      APP_NAME: PIA API
      APP_VERSION: 0.1.0
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://pia:pia@postgres:5432/pia
      JWT_SECRET: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
